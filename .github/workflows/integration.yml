---
name: E2E

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          make init
          make deps
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Start Conduwuit Configured Homeserver
        run: |
          cat << 'EOF' > conduwuit.toml
          [global]
          server_name = "localhost"
          allow_registration = true
          yes_i_am_very_sure_i_want_an_open_server = true
          force_disable_first_run_mode = true
          database_path = "/tmp/conduwuit"
          database_backend = "sqlite"
          address = "0.0.0.0"
          port = 8008
          EOF
          docker run -d -t --name conduwuit \
            -p 8008:8008 \
            -v $PWD/conduwuit.toml:/etc/conduwuit.toml:ro \
            -e CONDUWUIT_CONFIG=/etc/conduwuit.toml \
            ghcr.io/continuwuity/continuwuity:latest

      - name: Wait for Conduwuit to be ready
        run: |
          echo "Waiting for Conduwuit to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8008/_matrix/client/versions > /dev/null; then
              echo "Conduwuit Ready!"
              exit 0
            fi
            sleep 1
          done
          echo "Conduwuit failed to start in time!"
          exit 1

      - name: Run CI Integration Tests
        run: |
          python docker/test_integration.py
