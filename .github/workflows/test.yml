---
name: Test and Lint

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          make init
          make deps
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Check code formatting
        run: make format

      - name: Lint code
        run: make lint

      - name: Run Unit Tests
        run: make test

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Conduit Homeserver (Integration Backend)
        run: |
          docker pull matrixconduit/matrix-conduit:latest
          docker run -d --name conduit \
            -p 8008:6167 \
            -e CONDUIT_SERVER_NAME=localhost \
            -e CONDUIT_ALLOW_REGISTRATION=true \
            matrixconduit/matrix-conduit:latest

          echo "Waiting for Conduit to be ready..."
          for i in {1..15}; do
            curl -s http://localhost:8008/_matrix/client/versions > /dev/null && echo "Conduit Ready!" && break || sleep 1
          done

      - name: Run CI Integration Tests
        run: |
          python docker/test_integration.py
