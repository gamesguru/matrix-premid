---
name: Test and Lint

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Check code formatting (Black)
        run: |
          black --check matrix_premid.py

      - name: Lint code (Flake8)
        run: |
          flake8 matrix_premid.py

      - name: Run Unit Tests (pytest)
        run: |
          python -m pytest --cov=matrix_premid --cov-report=term-missing tests/

      - name: Start Conduit Homeserver (Integration Backend)
        run: |
          docker pull matrixconduit/matrix-conduit:latest
          docker run -d --name conduit \
            -p 8008:6167 \
            -e CONDUIT_SERVER_NAME=localhost \
            -e CONDUIT_ALLOW_REGISTRATION=true \
            matrixconduit/matrix-conduit:latest

          echo "Waiting for Conduit to be ready..."
          for i in {1..15}; do
            curl -s http://localhost:8008/_matrix/client/versions > /dev/null && echo "Conduit Ready!" && break || sleep 1
          done

      - name: Run CI Integration Tests
        run: |
          python docker/test_integration.py
