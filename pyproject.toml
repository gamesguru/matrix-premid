[tool.black]
line-length = 88

[tool.isort]
profile = "black"
line_length = 88

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=matrix_premid --cov-report=term-missing"
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::pytest.PytestDeprecationWarning"
]

[tool.coverage.run]
command_line = "-m pytest -svv"
source = ["matrix_premid.py"]

[tool.coverage.report]
fail_under = 85.00
precision = 2
show_missing = true
skip_empty = true
skip_covered = true
